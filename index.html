<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tally — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f3ef;--sf:#fff;--bd:#ddd9d2;--tx:#1a1814;--tx2:#6b6560;--tx3:#a09a93;--green:#1a3a2a;--green2:#2d5e42;--red:#8b2020;--mono:'IBM Plex Mono',monospace}
body{background:var(--bg);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{margin-bottom:2rem}
.logo-name{font-size:26px;font-weight:600;color:var(--green);letter-spacing:-0.03em}
.logo-sub{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
h2{font-size:16px;font-weight:600;margin-bottom:6px}
.sub{font-size:12px;color:var(--tx3);margin-bottom:28px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.fg input{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:6px;font-family:var(--mono);font-size:13px;color:var(--tx);background:#f8f6f2;outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--green2);background:#fff}
.fg input::placeholder{color:var(--tx3)}
.btn{width:100%;padding:12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--mono);background:var(--green);color:#fff;margin-top:8px;transition:background .15s}
.btn:hover{background:var(--green2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.errmsg{display:none;background:#fdf0f0;color:var(--red);font-size:12px;padding:10px 14px;border-radius:6px;margin-top:12px;text-align:center;border:1px solid rgba(139,32,32,.15)}
.errmsg.show{display:block}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--tx3)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-name">Tally</div>
    <div class="logo-sub">Controle Financeiro</div>
  </div>
  <h2>Bem-vindo</h2>
  <p class="sub">Entre com suas credenciais para acessar.</p>
  <div class="fg">
    <label>E-mail</label>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>
  <div class="fg">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
  <div class="errmsg" id="err"></div>
  <div class="footer">Tally · Uso Privado</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbE4c5VA08a2F3jF0nVDivSgCtIeCuqKg",
  authDomain: "tally-finance.firebaseapp.com",
  projectId: "tally-finance",
  storageBucket: "tally-finance.firebasestorage.app",
  messagingSenderId: "118325290738",
  appId: "1:118325290738:web:0d30137db3b6ea58e8d26b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, async user => {
  if(user){
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()&&snap.data().primeiroAcesso===true){
      window.location.href='trocar-senha.html';
    } else {
      window.location.href='relatorios.html';
    }
  }
});

window.entrar = async () => {
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btn-entrar');
  const err=document.getElementById('err');
  if(!email||!senha){mostrarErro('Preencha e-mail e senha.');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Entrando...';
  err.classList.remove('show');
  try{
    const cred=await signInWithEmailAndPassword(auth,email,senha);
    const snap=await getDoc(doc(db,'users',cred.user.uid));
    if(snap.exists()&&snap.data().primeiroAcesso===true){
      window.location.href='trocar-senha.html';
    } else {
      window.location.href='relatorios.html';
    }
  }catch(e){
    btn.disabled=false;btn.textContent='Entrar';
    mostrarErro('E-mail ou senha incorretos.');
  }
};

function mostrarErro(msg){const err=document.getElementById('err');err.textContent=msg;err.classList.add('show');setTimeout(()=>err.classList.remove('show'),3000);}
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('senha').focus();});
document.getElementById('senha').addEventListener('keydown',e=>{if(e.key==='Enter')window.entrar();});
document.getElementById('email').focus();
</script>
</body>
</html>
