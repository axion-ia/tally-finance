<svg xmlns="http://www.w3.org/2000/svg" width="480" viewBox="0 0 480 180" role="img">
<title>Tally Gestão Financeira</title>

<!-- Barras crescentes brancas -->
<rect x="40" y="60" width="20" height="40" rx="3" fill="#fff"/>
<rect x="68" y="42" width="20" height="58" rx="3" fill="#fff"/>
<rect x="96" y="18" width="20" height="82" rx="3" fill="#fff"/>

<!-- Seta diagonal dourada -->
<line x1="45" y1="98" x2="116" y2="10" stroke="#b8963e" stroke-width="3.5" stroke-linecap="round"/>
<polygon points="116,10 100,8 113,22" fill="#b8963e"/>

<!-- Arco dourado -->
<path d="M26 100 Q54 136 116 110" fill="none" stroke="#b8963e" stroke-width="3" stroke-linecap="round"/>

<!-- Nome Tally branco -->
<text x="148" y="96" font-family="'IBM Plex Mono', monospace" font-size="70" font-weight="600" fill="#ffffff" letter-spacing="-2">Tally</text>

<!-- Linha + subtítulo + linha -->
<line x1="40" y1="124" x2="64" y2="124" stroke="#b8963e" stroke-width="1.5"/>
<text x="70" y="130" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="3">GESTÃO FINANCEIRA</text>
<line x1="294" y1="124" x2="318" y2="124" stroke="#b8963e" stroke-width="1.5"/>

</svg>
