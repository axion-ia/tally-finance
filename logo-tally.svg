<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90">
<title>Tally Gestão Financeira</title>

<!-- Barras crescentes -->
<rect x="22" y="28" width="13" height="30" rx="2" fill="#fff"/>
<rect x="40" y="17" width="13" height="41" rx="2" fill="#fff"/>
<rect x="58" y="4" width="13" height="54" rx="2" fill="#fff"/>

<!-- Seta dourada -->
<line x1="26" y1="56" x2="71" y2="2" stroke="#b8963e" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="71,2 61,3 69,12" fill="#b8963e"/>

<!-- Arco dourado -->
<path d="M18 58 Q38 78 72 62" fill="none" stroke="#b8963e" stroke-width="2" stroke-linecap="round"/>

<!-- Nome Tally -->
<text x="86" y="52" font-family="'IBM Plex Mono', monospace" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="-1">Tally</text>

<!-- Linha + subtítulo + linha -->
<line x1="22" y1="70" x2="34" y2="70" stroke="#b8963e" stroke-width="1.2"/>
<text x="38" y="75" font-family="'IBM Plex Mono', monospace" font-size="7.5" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="2">GESTÃO FINANCEIRA</text>
<line x1="174" y1="70" x2="186" y2="70" stroke="#b8963e" stroke-width="1.2"/>

</svg>
