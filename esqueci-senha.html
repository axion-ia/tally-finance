<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tally — Esqueci minha senha</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f3ef;--sf:#fff;--bd:#ddd9d2;--tx:#1a1814;--tx2:#6b6560;--tx3:#a09a93;--green:#1a3a2a;--green2:#2d5e42;--red:#8b2020;--mono:'IBM Plex Mono',monospace}
body{background:var(--bg);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{margin-bottom:2rem}
.logo img{width:180px;filter:invert(20%) sepia(40%) saturate(500%) hue-rotate(100deg) brightness(40%)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--tx3);text-decoration:none;margin-bottom:1.5rem;transition:color .15s}
.back:hover{color:var(--tx)}
h2{font-size:16px;font-weight:600;margin-bottom:6px}
.sub{font-size:12px;color:var(--tx3);margin-bottom:28px;line-height:1.6}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fg input{width:100%;padding:11px 14px;border:1px solid var(--bd);border-radius:8px;font-family:var(--mono);font-size:13px;color:var(--tx);background:#f8f6f2;outline:none;transition:border-color .15s;height:42px}
.fg input:focus{border-color:var(--green2);background:#fff}
.fg input::placeholder{color:var(--tx3)}
.btn{width:100%;padding:13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--mono);background:var(--green);color:#fff;transition:background .15s}
.btn:hover{background:var(--green2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.sucmsg{display:none;background:#edf7f2;color:#2d7a4f;font-size:12px;padding:12px 14px;border-radius:8px;margin-top:12px;text-align:center;border:1px solid rgba(45,122,79,.2);line-height:1.6}
.sucmsg.show{display:block}
.errmsg{display:none;background:#fdf0f0;color:var(--red);font-size:12px;padding:10px 14px;border-radius:8px;margin-top:12px;text-align:center;border:1px solid rgba(139,32,32,.15)}
.errmsg.show{display:block}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><img src="logo-tally-dark.svg" alt="Tally"/></div>
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar para o login
  </a>
  <h2>Esqueci minha senha</h2>
  <p class="sub">Informe seu e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
  <div class="fg">
    <label>E-mail</label>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>
  <button class="btn" id="btn" onclick="enviar()">Enviar link de redefinição</button>
  <div class="sucmsg" id="suc">✓ E-mail enviado! Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</div>
  <div class="errmsg" id="err"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {apiKey:"AIzaSyBbE4c5VA08a2F3jF0nVDivSgCtIeCuqKg",authDomain:"tally-finance.firebaseapp.com",projectId:"tally-finance",storageBucket:"tally-finance.firebasestorage.app",messagingSenderId:"118325290738",appId:"1:118325290738:web:0d30137db3b6ea58e8d26b"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

window.enviar=async()=>{
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const suc=document.getElementById('suc');
  if(!email){err.textContent='Informe seu e-mail.';err.classList.add('show');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Enviando...';
  err.classList.remove('show');suc.classList.remove('show');
  try{
    await sendPasswordResetEmail(auth,email);
    suc.classList.add('show');
    btn.textContent='E-mail enviado';
  }catch(e){
    btn.disabled=false;btn.textContent='Enviar link de redefinição';
    err.textContent='E-mail não encontrado ou inválido.';err.classList.add('show');
  }
};
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')window.enviar();});
document.getElementById('email').focus();
</script>
</body>
</html>
