<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tally — Histórico</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f0eb;
  --sf:#ffffff;
  --sf2:#f7f5f1;
  --bd:rgba(0,0,0,.07);
  --bdm:rgba(0,0,0,.12);
  --tx:#18160f;
  --tx2:#5c5852;
  --tx3:#9c9690;
  --green:#1a3a2a;
  --green2:#2d5e42;
  --green3:#0f2318;
  --gold:#b8963e;
  --gold2:#d4ac56;
  --red:#c94040;--red-bg:#fdf0f0;--red-bd:rgba(201,64,64,.2);
  --ora:#b07020;--ora-bg:#fdf5e8;
  --grn:#2d7a4f;--grn-bg:#edf7f2;--grn-bd:rgba(45,122,79,.2);
  --blu:#1e5fa8;
  --r:12px;--rs:7px;
  --sh:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
  --sh-sm:0 1px 3px rgba(0,0,0,.06);
  --mono:'Nunito',sans-serif;
  --pos:#2d7a4f;--neg:#c94040
}
body{font-family:var(--mono);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.layout{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:224px;background:var(--green);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;position:relative}
.sidebar::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(184,150,62,.3),transparent 40%,transparent 60%,rgba(184,150,62,.15))}
.sb-brand{padding:0;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-nav{flex:1;padding-top:.5rem}
.sb-sec{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;padding:14px 1.5rem 5px;font-weight:600}
.nav-a{display:flex;align-items:center;gap:10px;padding:9px 1.5rem;font-size:13px;color:rgba(255,255,255,.5);border-left:2px solid transparent;text-decoration:none;transition:color .12s,background .12s;font-weight:500}
.nav-a:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.nav-a.on{color:#fff;background:rgba(255,255,255,.09);border-left-color:var(--gold)}
.nav-a svg{flex-shrink:0;opacity:.65}
.nav-a.on svg{opacity:1}
.nav-sub{display:flex;align-items:center;gap:10px;padding:7px 1.5rem 7px 2.8rem;font-size:12px;color:rgba(255,255,255,.35);border-left:2px solid transparent;text-decoration:none;transition:color .12s}
.nav-sub:hover{color:rgba(255,255,255,.7)}
.nav-sub.on{color:rgba(255,255,255,.8);border-left-color:rgba(184,150,62,.4)}
.nav-sub::before{content:'·';font-size:16px;opacity:.5;margin-right:2px}
.sb-footer{padding:1.1rem 1.5rem;border-top:1px solid rgba(255,255,255,.07)}
.sb-email{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;font-weight:500}
.sb-role{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.btn-sair{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.5);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .12s;font-weight:500}
.btn-sair:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.tl .bc{font-size:11px;color:var(--tx3);letter-spacing:.01em}
.tl .bc b{color:var(--tx2);font-weight:600}
.tl h1{font-size:20px;font-weight:700;margin-top:3px;letter-spacing:-.03em;color:var(--tx)}
.tr{display:flex;gap:8px}
.content{padding:28px;flex:1;overflow-y:auto}

/* ── Botões ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:none;font-family:var(--mono);transition:all .15s;font-weight:600}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{background:var(--green2)}
.btn-g{background:none;border:1px solid var(--bdm);color:var(--tx2)}.btn-g:hover{background:var(--sf2);color:var(--tx)}

/* ── Filtros ── */
.fbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px;padding:14px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh-sm)}
.fbar label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
select.fs{padding:0 12px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--mono);font-size:13px;color:var(--tx);background:var(--sf);outline:none;height:34px;cursor:pointer;font-weight:500;transition:border-color .12s}
select.fs:focus{border-color:var(--green)}

/* ── KPIs de movimento ── */
.mov-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px}
.mov-card{border-radius:var(--r);padding:1.35rem 1.5rem}
.mov-card.main{background:linear-gradient(135deg,var(--green3) 0%,var(--green) 100%);box-shadow:0 4px 20px rgba(26,58,42,.25)}
.mov-card.sub{background:var(--sf);border:1px solid var(--bd);box-shadow:var(--sh-sm)}
.mov-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:700}
.mov-card.main .mov-lbl{color:rgba(255,255,255,.45)}
.mov-card.sub .mov-lbl{color:var(--tx3)}
.mov-val{font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1}
.mov-card.main .mov-val{color:#fff}
.mov-sub{font-size:11px;margin-top:6px;font-weight:500}
.mov-card.main .mov-sub{color:rgba(255,255,255,.35)}
.mov-card.sub .mov-sub{color:var(--tx3)}

/* ── Stats KPI ── */
.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bd)}
.stat.s-grn::before{background:linear-gradient(90deg,var(--grn),transparent)}
.stat.s-red::before{background:linear-gradient(90deg,var(--red),transparent)}
.stat.s-ora::before{background:linear-gradient(90deg,var(--ora),transparent)}
.stat.s-gold::before{background:linear-gradient(90deg,var(--gold),transparent)}
.stat-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:700}
.stat-val{font-size:22px;font-weight:700;margin-bottom:3px;letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--tx3);font-weight:500}

/* ── Cards gráfico ── */
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh-sm)}
.rcard h3{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--bg);display:flex;align-items:center;gap:8px}
.rcard h3::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px;flex-shrink:0}
.ch-wrap{position:relative;height:200px}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:12px;color:var(--tx2)}
.leg-i{display:flex;align-items:center;gap:5px;font-weight:500}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Aging ── */
.ar{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd)}.ar:last-child{border-bottom:none}
.bb{flex:1;height:5px;background:var(--bg);border-radius:99px;overflow:hidden;max-width:120px}
.bf{height:100%;border-radius:99px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ── Fluxo ── */
.fr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px;font-weight:500}.fr:last-child{border-bottom:none}

/* ── Tabela ── */
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;margin-top:16px}
.tcard-top{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--sf2)}
.tcard-cnt{font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:11px 18px;border-bottom:1px solid var(--bd);background:var(--sf2)}
tbody td{padding:12px 18px;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px;vertical-align:middle;font-weight:500}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#faf8f4}
tbody tr:hover td{border-bottom-color:transparent}

/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600}
.bdg-s{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}
.bdg-d{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bdg-w{background:var(--ora-bg);color:var(--ora);border:1px solid rgba(176,112,32,.2)}
.bdg-i{background:#eef4fd;color:var(--blu);border:1px solid rgba(30,95,168,.15)}

.empty{text-align:center;padding:32px;color:var(--tx3);font-size:13px;font-weight:500}

@media print{
  .sidebar,.topbar,.fbar,.rg2,#aging,#fluxo-l,div[style*="grid-template-columns:1fr 1fr 1fr"],.tcard-top div:last-child{display:none!important}
  body{background:#fff;-webkit-print-color-adjust:exact}
  .main{overflow:visible}
  .content{padding:12px}
  .tcard{box-shadow:none;border:1px solid #ccc}
  .stats4{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:8px!important;margin-bottom:12px!important}
  .stat{padding:10px 12px!important;border:1px solid #ccc!important;box-shadow:none!important}
  .stat-lbl{font-size:10px!important;margin-bottom:4px!important}
  .stat-val{font-size:16px!important;white-space:nowrap!important}
  .stat-sub{font-size:10px!important;margin-top:2px!important}
  .print-header{display:block!important}
}
.print-header{display:none;margin-bottom:16px}
.print-header h2{font-size:16px;font-weight:700}
.print-header p{font-size:12px;color:var(--tx3);margin-top:4px}


.loading{text-align:center;padding:4rem;color:var(--tx3);font-size:13px}
/* Filtro */
.fbar{display:flex;gap:10px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap}
.fbar label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.fbar input[type=month]{padding:7px 12px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--mono);font-size:13px;color:var(--tx);background:var(--sf);outline:none;height:34px}
.fbar input[type=month]:focus{border-color:var(--green)}
.btn-g{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--bdm);background:transparent;font-family:var(--mono);color:var(--tx2);transition:all .15s}
.btn-g:hover{background:var(--sf2)}

/* ── Drawer ── */
.drawer{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:var(--sf);box-shadow:-4px 0 32px rgba(0,0,0,.12);z-index:200;display:flex;flex-direction:column;transition:right .25s cubic-bezier(.4,0,.2,1)}
.drawer.open{right:0}
.dh{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dt{font-size:15px;font-weight:700;color:var(--tx)}
.dbody{flex:1;overflow-y:auto;padding:20px}
.df{padding:16px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0;background:var(--sf2)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:700}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--mono);font-size:13px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .12s;font-weight:500}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green);background:#fff}
.fg textarea{resize:vertical;min-height:72px}
.fg input::placeholder,.fg textarea::placeholder{color:var(--tx3)}
.inp-wrap{position:relative}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;align-items:center;justify-content:center}.mbg.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r);padding:28px;width:420px;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:8px}
.modal p{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.bo{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd);display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600}
.bc2{background:var(--sf2);color:var(--tx3);border:1px solid var(--bd);display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600}
.val{font-size:26px;font-weight:700;letter-spacing:-.03em}
.val.neg{color:var(--red)}
.acts{display:flex;gap:6px;justify-content:flex-end}
.btn-i{background:none;border:none;cursor:pointer;color:var(--tx3);padding:5px;border-radius:6px;display:flex;align-items:center;transition:all .12s}
.btn-i:hover{background:var(--sf2);color:var(--tx)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--grn)}
#toast.err{background:var(--red)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Histórico específico ── */
.hd{margin-bottom:20px}
.hdd{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.hdd-l{font-size:12px;color:var(--tx3);font-weight:500}
/* Card de dia */
.dc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:var(--sh-sm)}
.dh-m{padding:13px 18px;cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:space-between}
.dh-m:hover{background:var(--sf2)}
.dhi{display:flex;align-items:center;gap:16px;flex:1;flex-wrap:wrap}
.dd-m{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--tx)}
.ds-m{display:flex;gap:12px;font-size:12px;color:var(--tx3);font-weight:500;flex-wrap:wrap}
.ds-m strong{color:var(--tx2);font-weight:700}
.dch{font-size:16px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.dch.open{transform:rotate(180deg)}
/* Body do dia */
.db-m{display:none;border-top:1px solid var(--bd)}
.db-m.open{display:block}
/* Entrada */
.he{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--bd);font-size:13px}
.he-d{flex:1;font-weight:600;color:var(--tx)}
.he-i{color:var(--grn);font-weight:700}
.he-l{font-weight:500;color:var(--tx3)}
.he-l.pos{color:var(--grn)}
.he-l.neg{color:var(--red)}
/* Despesa vinculada */
.hd{display:flex;justify-content:space-between;align-items:center;padding:7px 18px 7px 36px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx3)}
.dn{font-weight:500}
.dv{font-weight:700;color:var(--tx2)}
/* Rodapé do dia */
.hr-m{padding:12px 18px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:12px;background:var(--sf2)}
.hlf{font-size:15px;font-weight:700}
.hlf.pos{color:var(--grn)}
.hlf.neg{color:var(--red)}
/* Despesas do dia */
.hdd{margin:0;padding:10px 18px;border-bottom:1px solid var(--bd)}
.hdd-l{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
/* Cabeçalho do mês */
.mt-m{font-size:12px;color:var(--tx3);font-weight:600;padding:16px 0 8px;display:flex;align-items:center;gap:6px}
.mt-m strong{color:var(--tx2)}
/* Sem lançamentos */
.empty{text-align:center;padding:32px;color:var(--tx3);font-size:13px;font-weight:500}
.btn-reabrir{background:none;border:1px solid var(--bdm);border-radius:var(--rs);padding:5px 12px;font-size:11px;font-weight:700;color:var(--green);cursor:pointer;font-family:var(--mono);transition:all .12s;text-decoration:none;display:inline-block}
.btn-reabrir:hover{background:var(--green);color:#fff;border-color:var(--green)}
/* Variáveis de cor */
--pos:var(--grn);--neg:var(--red)
</style>
</head>

<div class="layout" id="app" style="display:none">
  <aside class="sidebar">
    <div class="sb-brand">

      <img src="logo-tally.svg" style="width:100%;display:block"/>

      <a class="nav-a" href="fornecedores.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Fornecedores</a>
      <div class="sb-sec" id="sec-admin" style="display:none">Admin</div>
      <a class="nav-a" id="nav-usuarios" href="usuarios.html" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Usuários</a>
      <a class="nav-a" id="nav-opcoes" href="opcoes.html" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Opções</a>
    </nav>
    <div class="sb-footer">
      <div class="sb-role" id="sb-role">—</div>
      <div class="sb-email" id="sb-nome"></div>
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="sb-email">—</div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="tl"><div class="bc">Financeiro › Movimento › <b>Histórico</b></div><h1>Histórico de Movimentos</h1></div>
    </div>
    <div class="content">
      <div class="fbar">
        <label>Filtrar por mês</label>
        <input type="month" id="filtro-mes" onchange="renderHist()"/>
        <button class="btn-g" onclick="limparFiltro()">Limpar</button>
      </div>
      <div id="hist-list"><div class="loading">Carregando...</div></div>
    </div>
  </div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1814;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyBbE4c5VA08a2F3jF0nVDivSgCtIeCuqKg",authDomain:"tally-finance.firebaseapp.com",projectId:"tally-finance",storageBucket:"tally-finance.firebasestorage.app",messagingSenderId:"118325290738",appId:"1:118325290738:web:0d30137db3b6ea58e8d26b"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const ADMIN='doug.alveslisboa@gmail.com';

const fmt=v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=s=>new Date(s+'T00:00:00').toLocaleDateString('pt-BR');
const iso=d=>d.toISOString().slice(0,10);
const getTodayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const getMesNome=s=>{const[y,m]=s.split('-');const d=new Date(y,parseInt(m)-1,1);const n=d.toLocaleString('pt-BR',{month:'long'});return n.charAt(0).toUpperCase()+n.slice(1)+' '+y;};

let movData=[];

const toast=(msg,tipo)=>{const t=document.getElementById('toast');t.textContent=msg;t.style.background=tipo==='ok'?'#2d7a4f':tipo==='err'?'#c94040':'#1a1814';t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(80px)';},2800);};

window.sair=()=>signOut(auth).then(()=>window.location.href='index.html');

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  const isAdmin=user.email===ADMIN;
  document.getElementById('sb-nome').textContent=user.email;
  document.getElementById('sb-email').textContent=user.email;
  document.getElementById('sb-role').textContent=isAdmin?'Administrador':'Usuário';
  // Buscar nome do usuário
  try{const uSnap=await getDoc(doc(db,'users',user.uid));if(uSnap.exists()&&uSnap.data().nome){document.getElementById('sb-nome').textContent=uSnap.data().nome;}if(uSnap.exists()&&uSnap.data().ativo===false){await signOut(auth);window.location.href='index.html';return;}}catch(e){}
  if(isAdmin){document.getElementById('sec-admin').style.display='';document.getElementById('nav-usuarios').style.display='';document.getElementById('nav-opcoes').style.display='';}
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  await load();
});

async function load(){
  try{
    const snap=await getDoc(doc(db,'movimento','data'));
    if(snap.exists()){
      movData=JSON.parse(snap.data().financeData||'[]');
      movData.forEach(d=>{
        d.previousBalance=Number(d.previousBalance)||0;
        d.incomes=d.incomes||[];
        d.dailyExpenses=d.dailyExpenses||[];
        d.incomes.forEach(i=>{i.value=Number(i.value)||0;i.linkedExpenses=i.linkedExpenses||[];i.linkedExpenses.forEach(le=>le.value=Number(le.value)||0);});
        d.dailyExpenses.forEach(e=>e.value=Number(e.value)||0);
      });

      // Preencher dias faltantes entre o primeiro registro e hoje
      if(movData.length){
        const datas=new Set(movData.map(d=>d.date));
        const primeiro=movData.slice().sort((a,b)=>a.date.localeCompare(b.date))[0].date;
        const today=getTodayStr();
        let cur=new Date(primeiro+'T00:00:00');
        const fim=new Date(today+'T00:00:00');
        while(cur<=fim){
          const ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
          if(!datas.has(ds)){
            movData.push({date:ds,status:'closed',incomes:[],dailyExpenses:[],previousBalance:0,net:0});
          }
          cur.setDate(cur.getDate()+1);
        }
      }

      // Recalcular saldos na ordem correta
      movData.sort((a,b)=>a.date.localeCompare(b.date));
      let running=0,lastClosed='---';
      movData.forEach(d=>{
        d.previousBalance=running;d.referenceDate=lastClosed;
        const sI=d.incomes.reduce((s,i)=>s+i.value,0);
        const sL=d.incomes.reduce((s,i)=>s+i.linkedExpenses.reduce((x,le)=>x+le.value,0),0);
        const sD=d.dailyExpenses.reduce((s,e)=>s+e.value,0);
        d.net=sI-sL-sD;
        if(d.status==='closed'){running+=d.net;lastClosed=d.date;}
      });

      movData.sort((a,b)=>b.date.localeCompare(a.date));
    }
  }catch(e){console.error(e);}
  renderHist();
}

window.renderHist=()=>{
  const el=document.getElementById('hist-list');
  const filtro=document.getElementById('filtro-mes').value;
  const today=getTodayStr();

  let dados=movData;
  if(filtro) dados=movData.filter(d=>d.date.startsWith(filtro));
  if(!dados.length){el.innerHTML='<div class="empty">Nenhum movimento encontrado.</div>';return;}

  // Agrupar por mês
  const grupos={};
  dados.forEach(d=>{
    const k=d.date.substring(0,7);
    if(!grupos[k])grupos[k]={key:k,days:[],total:0};
    grupos[k].days.push(d);
    if(d.status==='closed'){
      const sI=d.incomes.reduce((s,i)=>s+i.value,0);
      const sL=d.incomes.reduce((s,i)=>s+i.linkedExpenses.reduce((x,le)=>x+le.value,0),0);
      const sD=d.dailyExpenses.reduce((s,e)=>s+e.value,0);
      grupos[k].total+=sI-sL-sD;
    }
  });

  el.innerHTML=Object.values(grupos).map((g,gi)=>{
    const diasHTML=g.days.map((day,di)=>{
      const uid2=`${gi}-${di}`;
      const isFirst=gi===0&&di===0&&!filtro;
      const tE=day.incomes.reduce((s,i)=>s+i.value,0);
      const tL=day.incomes.reduce((s,i)=>s+i.linkedExpenses.reduce((x,le)=>x+le.value,0),0);
      const tD=day.dailyExpenses.reduce((s,e)=>s+e.value,0);
      const liqD=day.previousBalance+tE-tL-tD;

      const entradasH=day.incomes.map(inc=>{
        const dT=inc.linkedExpenses.reduce((s,le)=>s+le.value,0);
        const lE=inc.value-dT;
        const dR=inc.linkedExpenses.map(le=>`<div class="hd"><span class="dn">${le.description}</span><span class="dv">${fmt(le.value)}</span></div>`).join('');
        return `<div class="he"><span class="he-d">${inc.description}</span><span class="he-i">${fmt(inc.value)}</span><span class="he-l ${lE>=0?'pos':'neg'}">${fmt(lE)}</span></div>${dR}`;
      }).join('');

      const despD=day.dailyExpenses.length?`<div class="hdd"><div class="hdd-l">Despesas do Dia</div>${day.dailyExpenses.map(d=>`<div class="hd" style="padding-left:18px"><span class="dn">${d.description}</span><span class="dv">${fmt(d.value)}</span></div>`).join('')}</div>`:'';

      const btnR=day.status==='closed'
        ?`<a href="movimento.html" class="btn-reabrir" onclick="reabrirDia('${day.date}',event)">${day.date===today?'Abrir':'Reabrir'} Movimento</a>`
        :'<span style="font-size:11px;color:var(--grn)">Em andamento</span>';

      return `<div class="dc">
        <div class="dh-m" onclick="toggleDia('${uid2}')">
          <div class="dhi">
            <div class="dd-m">${fmtD(day.date)}<span class="${day.status==='open'?'bo':'bc2'}">${day.status==='open'?'Aberto':'Fechado'}</span></div>
            <div class="ds-m">
              <span>Entradas <strong>${fmt(tE)}</strong></span>
              <span>Saídas <strong>${fmt(tL+tD)}</strong></span>
              <span>Saldo <strong style="color:${liqD>=0?'var(--pos)':'var(--neg)'}">${fmt(liqD)}</strong></span>
            </div>
          </div>
          <span class="dch ${isFirst?'open':''}" id="dch-${uid2}">&#x2303;</span>
        </div>
        <div class="db-m ${isFirst?'open':''}" id="dbm-${uid2}">
          ${entradasH||'<div style="padding:12px 18px;font-size:13px;color:var(--tx3)">Sem lançamentos</div>'}
          ${despD}
          <div class="hr-m">
            <span>Saldo anterior: <strong>${fmt(day.previousBalance)}</strong></span>
            <div style="display:flex;align-items:center;gap:12px">
              ${btnR}
              <span class="hlf ${liqD>=0?'pos':'neg'}">${fmt(liqD)}</span>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    const totalEnt=g.days.reduce((s,d)=>s+d.incomes.reduce((x,i)=>x+i.value,0),0);
    return `<div class="mt-m">${getMesNome(g.key+'-01')}<span>· Entradas <strong>${fmt(totalEnt)}</strong> · Líquido <strong style="color:${g.total>=0?'var(--pos)':'var(--neg)'}">${fmt(g.total)}</strong></span></div>${diasHTML}`;
  }).join('');
};

window.toggleDia=uid2=>{
  document.getElementById('dbm-'+uid2).classList.toggle('open');
  document.getElementById('dch-'+uid2).classList.toggle('open');
};

window.limparFiltro=()=>{
  document.getElementById('filtro-mes').value='';
  renderHist();
};

window.reabrirDia=async(date,e)=>{
  if(e)e.preventDefault();
  if(!confirm(`Abrir movimento de ${fmtD(date)}?`))return;
  try{
    const snap=await getDoc(doc(db,'movimento','data'));
    let data=snap.exists()?JSON.parse(snap.data().financeData||'[]'):[];
    let day=data.find(d=>d.date===date);
    if(!day){
      // Dia não existe no Firestore ainda, criar
      day={date,status:'open',incomes:[],dailyExpenses:[]};
      data.push(day);
    } else {
      day.status='open';
    }
    await setDoc(doc(db,'movimento','data'),{financeData:JSON.stringify(data)});
    sessionStorage.setItem('mov_active_date',date);
    window.location.href='movimento.html?reabrir=1';
  }catch(err){console.error(err);toast('Erro ao abrir movimento.','err');}
};
</script>
</body>
